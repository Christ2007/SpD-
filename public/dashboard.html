<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpeedDrone — Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="bg-pattern"></div>

  <nav class="navbar">
    <a class="logo" href="#">Speed<span>Drone</span></a>
    <div class="navbar-right">
      <span class="nav-user">Benvenuto, <strong id="navUsername">—</strong></span>
      <button class="btn btn-ghost" id="logoutBtn" style="font-size:0.8rem;padding:0.45rem 0.9rem;">Esci</button>
    </div>
  </nav>

  <div class="page">
    <div class="dashboard-grid animate-in">
      <!-- Left: Log hours -->
      <div>
        <!-- Balance stat -->
        <div class="stat-card" style="margin-bottom:1.2rem;">
          <div class="stat-value" id="balanceHours">0.00</div>
          <div class="stat-unit" style="display:inline">h</div>
          <div class="stat-label">Ore Totali Accumulate</div>
          <div style="font-size:0.78rem;color:var(--text-muted);margin-top:0.4rem;" id="balanceQuarters">0 quarti d'ora</div>
        </div>

        <!-- Log form card -->
        <div class="card card-accent">
          <div class="section-header">
            <div class="section-title">Registra <span class="accent">Ore</span></div>
          </div>
          <div id="logAlert" class="alert hidden"></div>
          <form id="logForm">
            <div class="form-group">
              <label for="quarters">Quarti d'Ora Lavorati</label>
              <select id="quarters" name="quarters" required>
                <option value="">— Seleziona —</option>
                <option value="1">1 quarto (15 min)</option>
                <option value="2">2 quarti (30 min)</option>
                <option value="3">3 quarti (45 min)</option>
                <option value="4">4 quarti (1 ora)</option>
                <option value="6">6 quarti (1h 30m)</option>
                <option value="8">8 quarti (2 ore)</option>
                <option value="12">12 quarti (3 ore)</option>
                <option value="16">16 quarti (4 ore)</option>
                <option value="20">20 quarti (5 ore)</option>
                <option value="24">24 quarti (6 ore)</option>
                <option value="32">32 quarti (8 ore)</option>
              </select>
            </div>
            <div class="form-group">
              <label for="description">Descrizione Attività</label>
              <textarea id="description" name="description" rows="3" placeholder="Cosa hai lavorato? (opzionale)"></textarea>
            </div>
            <button type="submit" class="btn btn-primary btn-full" id="logBtn">
              Registra
            </button>
          </form>
        </div>

        <!-- Change Password card -->
        <div class="card" style="margin-top:1.5rem;">
          <div class="section-header">
            <div class="section-title">Cambia <span class="accent">Password</span></div>
          </div>
          <div id="pwdAlert" class="alert hidden"></div>
          <form id="pwdForm">
            <div class="form-group">
              <label for="currentPwd">Password Attuale</label>
              <input type="password" id="currentPwd" required>
            </div>
            <div class="form-group">
              <label for="newPwd">Nuova Password</label>
              <input type="password" id="newPwd" required>
            </div>
            <button type="submit" class="btn btn-ghost btn-full" id="pwdBtn">
              Aggiorna Password
            </button>
          </form>
        </div>
      </div>

      <!-- Right: History -->
      <div class="card">
        <div class="section-header">
          <div class="section-title">Storico <span class="accent">Attività</span></div>
          <button class="btn btn-ghost" id="refreshBtn" style="font-size:0.8rem;padding:0.4rem 0.8rem;">↺ Aggiorna</button>
        </div>
        <div id="historyList">
          <div class="empty"><div class="empty-icon">📋</div>Nessuna attività registrata</div>
        </div>
      </div>
    </div>

    <!-- Admin Panel (visible only to admins) -->
    <div class="card admin-panel" id="adminPanel" style="display:none; margin-top:1.5rem; max-width:1200px; margin-left:auto; margin-right:auto; padding-left:1.5rem; padding-right:1.5rem;">
      <div class="section-header">
        <div class="section-title">👑 Admin — <span class="accent">Gestione Ore</span></div>
        <button class="btn btn-ghost" id="adminRefreshBtn" style="font-size:0.8rem;padding:0.4rem 0.8rem;">↺</button>
      </div>
      <div id="adminAlert" class="alert hidden" style="margin-bottom:1rem;"></div>
      <div id="adminUserList">
        <div class="empty"><div class="empty-icon">👥</div>Caricamento utenti…</div>
      </div>
    </div>
  </div>

  <!-- Confirm Modal -->
  <div class="modal-overlay" id="confirmModal">
    <div class="modal-box">
      <h3 id="modalTitle">Conferma operazione</h3>
      <p id="modalBody">Sei sicuro?</p>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="modalCancel">Annulla</button>
        <button class="btn btn-danger-solid" id="modalConfirm">Conferma</button>
      </div>
    </div>
  </div>

  <!-- Entry-Picker Modal -->
  <div class="modal-overlay" id="pickerModal">
    <div class="picker-box">
      <div class="picker-header">
        <h3 id="pickerTitle">Seleziona ore da annullare</h3>
        <label class="picker-select-all">
          <input type="checkbox" id="pickerSelectAll"> Seleziona tutto
        </label>
      </div>
      <div class="picker-list" id="pickerList"></div>
      <div class="picker-footer">
        <div class="picker-summary" id="pickerSummary">Nessuna voce selezionata</div>
        <div class="picker-actions">
          <button class="btn btn-ghost" id="pickerCancel">Annulla</button>
          <button class="btn-danger-solid" id="pickerConfirm" disabled>🗑 Elimina selezionate</button>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    const user = requireAuth(false);
    if (user) {
      document.getElementById('navUsername').textContent = user.displayName || user.username;

      // Logout
      document.getElementById('logoutBtn').addEventListener('click', () => {
        clearAuth();
        window.location = '/';
      });

      // Refresh button
      document.getElementById('refreshBtn').addEventListener('click', loadData);

      async function loadData() {
        try {
          const data = await apiFetch('/hours/my');
          const q = data.balance || 0;
          document.getElementById('balanceHours').textContent = hoursFromQuarters(q);
          document.getElementById('balanceQuarters').textContent = `${q} ${q === 1 ? 'quarto' : 'quarti'} d'ora`;

          const list = document.getElementById('historyList');
          if (!data.entries || data.entries.length === 0) {
            list.innerHTML = '<div class="empty"><div class="empty-icon">📋</div>Nessuna attività registrata</div>';
            return;
          }
          list.innerHTML = data.entries.map(e => `
            <div class="entry-item">
              <div>
                <div class="entry-desc">${e.description || '<em style="color:var(--text-muted)">Nessuna descrizione</em>'}</div>
                <div class="entry-date">${formatDate(e.createdAt)}</div>
              </div>
              <div class="entry-time">+${(e.quarters / 4).toFixed(2)}h<br><span style="font-size:0.75rem;color:var(--text-muted);font-family:Inter">${e.quarters} quart${e.quarters === 1 ? 'o' : 'i'}</span></div>
            </div>
          `).join('');
        } catch (err) {
          console.error(err);
        }
      }

      // Log form
      document.getElementById('logForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('logBtn');
        const quarters = document.getElementById('quarters').value;
        const description = document.getElementById('description').value.trim();
        if (!quarters) { showAlert('logAlert', 'error', 'Seleziona il numero di quarti'); return; }

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span>';
        try {
          const data = await apiFetch('/hours/log', {
            method: 'POST',
            body: JSON.stringify({ quarters: Number(quarters), description })
          });
          showAlert('logAlert', 'success', `✓ Registrate ${quarters} quarti (${(quarters/4).toFixed(2)}h)`);
          document.getElementById('logForm').reset();
          // Update balance instantly
          const q = data.newBalance || 0;
          document.getElementById('balanceHours').textContent = hoursFromQuarters(q);
          document.getElementById('balanceQuarters').textContent = `${q} ${q === 1 ? 'quarto' : 'quarti'} d'ora`;
          loadData();
        } catch (err) {
          showAlert('logAlert', 'error', '✕ ' + err.message);
        } finally {
          btn.disabled = false;
          btn.innerHTML = 'Registra';
        }
      });

      // Change password form
      document.getElementById('pwdForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('pwdBtn');
        const currentPassword = document.getElementById('currentPwd').value;
        const newPassword = document.getElementById('newPwd').value;

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span>';
        try {
          await apiFetch('/auth/change-password', {
            method: 'POST',
            body: JSON.stringify({ currentPassword, newPassword })
          });
          showAlert('pwdAlert', 'success', '✓ Password aggiornata con successo');
          document.getElementById('pwdForm').reset();
        } catch (err) {
          showAlert('pwdAlert', 'error', '✕ ' + err.message);
        } finally {
          btn.disabled = false;
          btn.innerHTML = 'Aggiorna Password';
        }
      });

      loadData();

      // ── ADMIN PANEL ───────────────────────────────────────────────────────
      const isAdmin = user.role === 'admin' || user.isAdmin === true;

      if (isAdmin) {
        document.getElementById('adminPanel').style.display = 'block';
        document.getElementById('adminRefreshBtn').addEventListener('click', loadAdminUsers);
        loadAdminUsers();
      }

      // ── Confirm modal helpers ─────────────────────────────────────────────
      let _modalResolve = null;

      function showConfirm(title, body) {
        return new Promise(resolve => {
          _modalResolve = resolve;
          document.getElementById('modalTitle').textContent = title;
          document.getElementById('modalBody').textContent = body;
          document.getElementById('confirmModal').classList.add('active');
        });
      }

      document.getElementById('modalCancel').addEventListener('click', () => {
        document.getElementById('confirmModal').classList.remove('active');
        if (_modalResolve) { _modalResolve(false); _modalResolve = null; }
      });

      document.getElementById('modalConfirm').addEventListener('click', () => {
        document.getElementById('confirmModal').classList.remove('active');
        if (_modalResolve) { _modalResolve(true); _modalResolve = null; }
      });

      async function loadAdminUsers() {
        const listEl = document.getElementById('adminUserList');
        listEl.innerHTML = '<div class="empty"><div class="empty-icon">⏳</div>Caricamento…</div>';
        try {
          const users = await apiFetch('/admin/users');
          if (!users || users.length === 0) {
            listEl.innerHTML = '<div class="empty"><div class="empty-icon">👥</div>Nessun utente trovato</div>';
            return;
          }
          listEl.innerHTML = users.map(u => {
            const balance = u.balance ?? u.hoursBalance ?? 0;
            const hrs = (balance / 4).toFixed(2);
            return `
              <div class="admin-user-card" id="auc-${u.id}">
                <div class="admin-user-info">
                  <div class="admin-user-name">${u.displayName || u.username}</div>
                  <div class="admin-user-balance" id="bal-${u.id}">
                    ${hrs}h &nbsp;·&nbsp; ${balance} quart${balance === 1 ? 'o' : 'i'}
                  </div>
                </div>
                <div class="admin-user-actions">
                  <button
                    class="btn-danger"
                    onclick="openEntryPicker('${u.id}', '${(u.displayName || u.username).replace(/'/g, "\\'")}' )"
                    id="manageBtn-${u.id}"
                  >
                    ✎ Gestisci ore
                  </button>
                </div>
              </div>
            `;
          }).join('');
        } catch (err) {
          listEl.innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div>${err.message}</div>`;
        }
      }

      // ── Entry Picker ──────────────────────────────────────────────────────
      let _pickerUserId   = null;
      let _pickerUserName = null;
      let _pickerEntries  = [];

      window.openEntryPicker = async function(userId, userName) {
        _pickerUserId   = userId;
        _pickerUserName = userName;
        _pickerEntries  = [];

        const listEl = document.getElementById('pickerList');
        document.getElementById('pickerTitle').textContent = `Ore di ${userName}`;
        document.getElementById('pickerSummary').innerHTML = 'Caricamento…';
        document.getElementById('pickerConfirm').disabled = true;
        document.getElementById('pickerSelectAll').checked = false;
        listEl.innerHTML = '<div class="empty"><div class="empty-icon">⏳</div>Caricamento voci…</div>';
        document.getElementById('pickerModal').classList.add('active');

        try {
          const data = await apiFetch(`/admin/users/${userId}/hours`);
          _pickerEntries = (data.entries || []).slice().reverse();

          if (_pickerEntries.length === 0) {
            listEl.innerHTML = '<div class="empty"><div class="empty-icon">📋</div>Nessuna voce registrata</div>';
            document.getElementById('pickerSummary').innerHTML = '0 voci';
            return;
          }

          renderPickerEntries();
        } catch (err) {
          listEl.innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div>${err.message}</div>`;
          document.getElementById('pickerSummary').innerHTML = 'Errore nel caricamento';
        }
      };

      function renderPickerEntries() {
        const listEl = document.getElementById('pickerList');
        listEl.innerHTML = _pickerEntries.map((e) => `
          <label class="picker-entry" id="pe-${e._id || e.id}" onclick="toggleEntry(event, '${e._id || e.id}')">
            <input type="checkbox" id="chk-${e._id || e.id}" value="${e._id || e.id}" onchange="updatePickerSummary()">
            <div class="picker-entry-desc">
              <div>${e.description || '<em style="color:var(--text-muted)">Nessuna descrizione</em>'}</div>
              <div class="picker-entry-date">${formatDate(e.createdAt)}</div>
            </div>
            <div class="picker-entry-hours">
              +${(e.quarters / 4).toFixed(2)}h<br>
              <span style="font-size:0.72rem;font-weight:400;color:var(--text-muted)">${e.quarters} quart${e.quarters===1?'o':'i'}</span>
            </div>
          </label>
        `).join('');
        updatePickerSummary();
      }

      window.toggleEntry = function(event, entryId) {
        if (event.target.tagName === 'INPUT') return;
        const chk = document.getElementById(`chk-${entryId}`);
        chk.checked = !chk.checked;
        updatePickerSummary();
      };

      window.updatePickerSummary = function() {
        const checked = [...document.querySelectorAll('#pickerList input[type="checkbox"]:checked')];
        const totalQ  = checked.reduce((sum, chk) => {
          const entry = _pickerEntries.find(e => (e._id || e.id) == chk.value);
          return sum + (entry ? entry.quarters : 0);
        }, 0);

        _pickerEntries.forEach(e => {
          const id  = e._id || e.id;
          const row = document.getElementById(`pe-${id}`);
          const chk = document.getElementById(`chk-${id}`);
          if (row) row.classList.toggle('selected', chk && chk.checked);
        });

        const total  = _pickerEntries.length;
        const selAll = document.getElementById('pickerSelectAll');
        selAll.indeterminate = checked.length > 0 && checked.length < total;
        selAll.checked = checked.length === total && total > 0;

        const btn = document.getElementById('pickerConfirm');
        if (checked.length === 0) {
          document.getElementById('pickerSummary').innerHTML = 'Nessuna voce selezionata';
          btn.disabled = true;
        } else {
          document.getElementById('pickerSummary').innerHTML =
            `<strong>${checked.length}</strong> voci selezionate &nbsp;·&nbsp; <strong>${(totalQ/4).toFixed(2)}h</strong> (${totalQ} quarti)`;
          btn.disabled = false;
        }
      };

      document.getElementById('pickerSelectAll').addEventListener('change', function() {
        document.querySelectorAll('#pickerList input[type="checkbox"]').forEach(chk => {
          chk.checked = this.checked;
        });
        updatePickerSummary();
      });

      document.getElementById('pickerCancel').addEventListener('click', () => {
        document.getElementById('pickerModal').classList.remove('active');
      });

      document.getElementById('pickerConfirm').addEventListener('click', async () => {
        const checked = [...document.querySelectorAll('#pickerList input[type="checkbox"]:checked')];
        if (checked.length === 0) return;

        const entryIds = checked.map(chk => chk.value);
        const totalQ   = checked.reduce((sum, chk) => {
          const entry = _pickerEntries.find(e => (e._id || e.id) == chk.value);
          return sum + (entry ? entry.quarters : 0);
        }, 0);

        const confirmed = await showConfirm(
          'Conferma eliminazione',
          `Eliminare ${checked.length} voci (${(totalQ/4).toFixed(2)}h) di ${_pickerUserName}?`
        );
        if (!confirmed) return;

        const btn = document.getElementById('pickerConfirm');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span>';

        try {
          const data = await apiFetch(`/admin/users/${_pickerUserId}/hours/entries`, {
            method: 'DELETE',
            body: JSON.stringify({ entryIds })
          });

          const newQ  = data.newBalance ?? 0;
          const balEl = document.getElementById(`bal-${_pickerUserId}`);
          if (balEl) balEl.textContent = `${(newQ/4).toFixed(2)}h · ${newQ} quart${newQ===1?'o':'i'}`;

          showAlert('adminAlert', 'success',
            `✓ Eliminate ${checked.length} voci di ${_pickerUserName} (−${(totalQ/4).toFixed(2)}h)`);

          document.getElementById('pickerModal').classList.remove('active');
        } catch (err) {
          showAlert('adminAlert', 'error', `✕ ${err.message}`);
        } finally {
          btn.disabled = false;
          btn.innerHTML = '🗑 Elimina selezionate';
        }
      });
    }
  </script>
</body>
</html>

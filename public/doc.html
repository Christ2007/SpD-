<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpeedDrone — Doc View</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="bg-pattern"></div>

  <nav class="navbar">
    <a class="logo" href="#">Speed<span>Drone</span></a>
    <div class="navbar-right">
      <span class="nav-user">📋 Doc: <strong id="navUsername">—</strong></span>
      <button class="btn btn-ghost" id="logoutBtn" style="font-size:0.8rem;padding:0.45rem 0.9rem;">Esci</button>
    </div>
  </nav>

  <div class="page">
    <div class="admin-container">

      <!-- Stats row -->
      <div class="stats-row" id="statsRow">
        <div class="stat-card">
          <div class="stat-value" id="statUsers">—</div>
          <div class="stat-label">Utenti Totali</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="statHours">—</div>
          <div class="stat-unit" style="display:inline">h</div>
          <div class="stat-label">Ore Totali Accumulate</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="statEntries">—</div>
          <div class="stat-label">Registrazioni Totali</div>
        </div>
      </div>

      <!-- User list (read-only) -->
      <div class="card" style="margin-top:0;">
        <div class="section-header">
          <div class="section-title">Ore <span class="accent">Utenti</span></div>
          <button class="btn btn-ghost" id="refreshBtn" style="font-size:0.8rem;padding:0.4rem 0.8rem;">↺ Aggiorna</button>
        </div>
        <div id="globalAlert" class="alert hidden" style="margin-bottom:1rem;"></div>
        <div id="userList">
          <div class="empty"><div class="empty-icon">⏳</div>Caricamento utenti…</div>
        </div>
      </div>

    </div>
  </div>

  <!-- Hours Viewer Modal -->
  <div class="modal-overlay" id="viewerModal">
    <div class="picker-box">
      <div class="picker-header">
        <h3 id="viewerTitle">Ore utente</h3>
        <span style="font-size:0.82rem;color:var(--text-muted);font-style:italic;">Solo lettura</span>
      </div>
      <div class="picker-list" id="viewerList"></div>
      <div class="picker-footer">
        <div class="picker-summary" id="viewerSummary"></div>
        <div class="picker-actions">
          <button class="btn btn-ghost" id="viewerClose">Chiudi</button>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    // Require auth — Doc users only (redirect others appropriately)
    const user = requireAuth(false);
    if (user) {
      if (user.isAdmin) { window.location = '/admin.html'; }
      else if (!user.isDoc) { window.location = '/dashboard.html'; }
    }

    if (user && user.isDoc) {
      document.getElementById('navUsername').textContent = user.displayName || user.username;

      document.getElementById('logoutBtn').addEventListener('click', () => {
        clearAuth();
        window.location = '/';
      });

      document.getElementById('refreshBtn').addEventListener('click', loadUsers);

      // ── Load all users ────────────────────────────────────────────────────
      async function loadUsers() {
        const listEl = document.getElementById('userList');
        listEl.innerHTML = '<div class="empty"><div class="empty-icon">⏳</div>Caricamento…</div>';
        try {
          const users = await apiFetch('/doc/users');

          const totalQ = users.reduce((s, u) => s + (u.hoursBalance ?? u.balance ?? 0), 0);
          document.getElementById('statUsers').textContent = users.length;
          document.getElementById('statHours').textContent = hoursFromQuarters(totalQ);

          let totalEntries = 0;

          if (!users || users.length === 0) {
            listEl.innerHTML = '<div class="empty"><div class="empty-icon">👥</div>Nessun utente trovato</div>';
            return;
          }

          listEl.innerHTML = users.map(u => {
            const balance = u.balance ?? u.hoursBalance ?? 0;
            const hrs = (balance / 4).toFixed(2);
            const isAdminUser = u.isAdmin;
            const isDocUser   = u.isDoc;
            return `
              <div class="admin-user-card" id="duc-${u.id}">
                <div class="admin-user-info">
                  <div class="admin-user-name">
                    ${u.displayName || u.username}
                    ${isAdminUser ? '<span class="badge badge-red" style="margin-left:0.4rem;">admin</span>' : ''}
                    ${isDocUser   ? '<span class="badge badge-red" style="margin-left:0.4rem;background:var(--accent-muted);color:var(--accent);">doc</span>' : ''}
                  </div>
                  <div class="admin-user-meta">@${u.username}</div>
                  <div class="admin-user-balance" id="bal-${u.id}">
                    ${hrs}h &nbsp;·&nbsp; ${balance} quart${balance === 1 ? 'o' : 'i'}
                  </div>
                </div>
                <div class="admin-user-actions">
                  <button
                    class="btn btn-ghost"
                    style="font-size:0.8rem;padding:0.4rem 0.75rem;"
                    onclick="openViewer('${u.id}', '${(u.displayName || u.username).replace(/'/g, "\\'")}')"
                    id="viewBtn-${u.id}"
                  >
                    👁 Visualizza ore
                  </button>
                </div>
              </div>
            `;
          }).join('');

          // Fetch total entry count across all users
          let count = 0;
          await Promise.all(users.map(async u => {
            try {
              const d = await apiFetch(`/doc/users/${u.id}/hours`);
              count += (d.entries || []).length;
            } catch {}
          }));
          document.getElementById('statEntries').textContent = count;

        } catch (err) {
          listEl.innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div>${err.message}</div>`;
        }
      }

      // ── Hours Viewer ──────────────────────────────────────────────────────
      window.openViewer = async function(userId, userName) {
        const listEl = document.getElementById('viewerList');
        document.getElementById('viewerTitle').textContent = `Ore di ${userName}`;
        document.getElementById('viewerSummary').innerHTML = 'Caricamento…';
        listEl.innerHTML = '<div class="empty"><div class="empty-icon">⏳</div>Caricamento voci…</div>';
        document.getElementById('viewerModal').classList.add('active');

        try {
          const data = await apiFetch(`/doc/users/${userId}/hours`);
          const entries = (data.entries || []).slice().reverse();

          document.getElementById('viewerSummary').innerHTML =
            `<strong>${entries.length}</strong> voci &nbsp;·&nbsp; <strong>${hoursFromQuarters(data.balance || 0)}h</strong> totali`;

          if (entries.length === 0) {
            listEl.innerHTML = '<div class="empty"><div class="empty-icon">📋</div>Nessuna voce registrata</div>';
            return;
          }

          listEl.innerHTML = entries.map(e => `
            <div class="picker-entry" style="cursor:default;">
              <div class="picker-entry-desc">
                <div>${e.description || '<em style="color:var(--text-muted)">Nessuna descrizione</em>'}</div>
                <div class="picker-entry-date">${formatDate(e.createdAt)}</div>
              </div>
              <div class="picker-entry-hours">
                +${(e.quarters / 4).toFixed(2)}h<br>
                <span style="font-size:0.72rem;font-weight:400;color:var(--text-muted)">${e.quarters} quart${e.quarters===1?'o':'i'}</span>
              </div>
            </div>
          `).join('');
        } catch (err) {
          listEl.innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div>${err.message}</div>`;
          document.getElementById('viewerSummary').innerHTML = 'Errore nel caricamento';
        }
      };

      document.getElementById('viewerClose').addEventListener('click', () => {
        document.getElementById('viewerModal').classList.remove('active');
      });

      // Initial load
      loadUsers();
    }
  </script>
</body>
</html>

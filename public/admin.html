<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpeedDrone — Admin</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="bg-pattern"></div>

  <nav class="navbar">
    <a class="logo" href="#">Speed<span>Drone</span></a>
    <div class="navbar-right">
      <span class="badge badge-red">ADMIN</span>
      <span class="nav-user"><strong id="navUsername">—</strong></span>
      <button class="btn btn-ghost" id="logoutBtn" style="font-size:0.8rem;padding:0.45rem 0.9rem;">Esci</button>
    </div>
  </nav>

  <div class="page">
    <div class="admin-container animate-in">

      <!-- Stats row -->
      <div class="stats-row" id="statsRow">
        <div class="stat-card">
          <div class="stat-value" id="statUsers">—</div>
          <div class="stat-label">Utenti Totali</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="statTotalHours">—</div>
          <div class="stat-label">Ore Totali Team</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="statEntries">—</div>
          <div class="stat-label">Registrazioni</div>
        </div>
      </div>

      <!-- Tabs -->
      <div class="tab-nav">
        <button class="tab-btn active" data-tab="tab-users">👥 Utenti</button>
        <button class="tab-btn" data-tab="tab-add">➕ Nuovo Utente</button>
        <button class="tab-btn" data-tab="tab-log">📋 Storico Globale</button>
        <button class="tab-btn" data-tab="tab-settings">⚙️ Impostazioni</button>
      </div>

      <!-- Tab: Users list -->
      <div id="tab-users" class="tab-content active">
        <div class="card">
          <div class="section-header">
            <div class="section-title">Bilancio <span class="accent">Ore</span> Utenti</div>
            <button class="btn btn-ghost" id="refreshUsers" style="font-size:0.8rem;padding:0.4rem 0.8rem;">↺ Aggiorna</button>
          </div>
          <div id="alertUsers" class="alert hidden"></div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Username</th>
                  <th>Nome</th>
                  <th>Ruolo</th>
                  <th>Ore (h)</th>
                  <th>Quarti</th>
                  <th>Azioni</th>
                </tr>
              </thead>
              <tbody id="usersTable">
                <tr><td colspan="6" style="text-align:center;color:var(--text-muted);padding:2rem;">Caricamento...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- Tab: Add user -->
      <div id="tab-add" class="tab-content">
        <div style="max-width: 480px;">
          <div class="card card-accent">
            <div class="section-header">
              <div class="section-title">Crea <span class="accent">Nuovo Utente</span></div>
            </div>
            <div id="alertAdd" class="alert hidden"></div>
            <form id="addUserForm">
              <div class="form-group">
                <label for="newUsername">Username</label>
                <input type="text" id="newUsername" placeholder="es. mario.rossi" required autocomplete="off">
              </div>
              <div class="form-group">
                <label for="newDisplayName">Nome Visualizzato</label>
                <input type="text" id="newDisplayName" placeholder="es. Mario Rossi">
              </div>
              <div class="form-group">
                <label for="newPassword">Password</label>
                <input type="password" id="newPassword" placeholder="Password sicura" required autocomplete="new-password">
              </div>
              <button type="submit" class="btn btn-primary btn-full" id="addBtn">
                Crea Utente
              </button>
            </form>
          </div>
        </div>
      </div>

      <!-- Tab: Global log -->
      <div id="tab-log" class="tab-content">
        <div class="card">
          <div class="section-header">
            <div class="section-title">Storico <span class="accent">Globale</span></div>
            <button class="btn btn-ghost" id="refreshLog" style="font-size:0.8rem;padding:0.4rem 0.8rem;">↺ Aggiorna</button>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Data</th>
                  <th>Utente</th>
                  <th>Quarti</th>
                  <th>Ore</th>
                  <th>Descrizione</th>
                </tr>
              </thead>
              <tbody id="globalLog">
                <tr><td colspan="5" style="text-align:center;color:var(--text-muted);padding:2rem;">Caricamento...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- Tab: Settings -->
      <div id="tab-settings" class="tab-content">
        <div style="max-width: 480px;">
          <div class="card">
            <div class="section-header">
              <div class="section-title">Cambia <span class="accent">Password</span></div>
            </div>
            <div id="pwdAlert" class="alert hidden"></div>
            <form id="pwdForm">
              <div class="form-group">
                <label for="currentPwd">Password Attuale</label>
                <input type="password" id="currentPwd" required>
              </div>
              <div class="form-group">
                <label for="newPwd">Nuova Password</label>
                <input type="password" id="newPwd" required>
              </div>
              <button type="submit" class="btn btn-primary btn-full" id="pwdBtn">
                Aggiorna Password
              </button>
            </form>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script src="app.js"></script>
  <script>
    const user = requireAuth(true);
    if (user) {
      document.getElementById('navUsername').textContent = user.displayName || user.username;
      document.getElementById('logoutBtn').addEventListener('click', () => { clearAuth(); window.location = '/'; });
      initTabs();

      // Load users
      async function loadUsers() {
        try {
          const users = await apiFetch('/admin/users');
          document.getElementById('statUsers').textContent = users.filter(u => !u.isAdmin).length;
          const totalQ = users.reduce((s, u) => s + (u.hoursBalance || 0), 0);
          document.getElementById('statTotalHours').textContent = (totalQ / 4).toFixed(1) + 'h';

          const tbody = document.getElementById('usersTable');
          if (!users.length) {
            tbody.innerHTML = '<tr><td colspan="6" class="empty">Nessun utente trovato</td></tr>';
            return;
          }
          tbody.innerHTML = users.map(u => `
            <tr>
              <td><strong>${u.username}</strong></td>
              <td>${u.displayName || '—'}</td>
              <td>${u.isAdmin ? '<span class="badge badge-red">Admin</span>' : '<span class="badge badge-green">Membro</span>'}</td>
              <td><strong style="color:var(--accent)">${(u.hoursBalance / 4).toFixed(2)}</strong></td>
              <td>${u.hoursBalance}</td>
              <td>${u.isAdmin ? '' : `<button class="btn btn-danger" onclick="deleteUser('${u._id}','${u.username}')">Elimina</button>`}</td>
            </tr>
          `).join('');
        } catch (err) {
          showAlert('alertUsers', 'error', '✕ ' + err.message);
        }
      }

      // Load global log
      async function loadLog() {
        try {
          const entries = await apiFetch('/admin/entries');
          document.getElementById('statEntries').textContent = entries.length;
          const tbody = document.getElementById('globalLog');
          if (!entries.length) {
            tbody.innerHTML = '<tr><td colspan="5" class="empty">Nessuna registrazione</td></tr>';
            return;
          }
          tbody.innerHTML = entries.map(e => `
            <tr>
              <td>${formatDate(e.createdAt)}</td>
              <td><strong>${e.username}</strong></td>
              <td>${e.quarters}</td>
              <td style="color:var(--accent);font-weight:600">${(e.quarters / 4).toFixed(2)}h</td>
              <td>${e.description || '<em style="color:var(--text-muted)">—</em>'}</td>
            </tr>
          `).join('');
        } catch (err) { console.error(err); }
      }

      // Delete user
      window.deleteUser = async (id, uname) => {
        if (!confirm(`Eliminare l'utente "${uname}"? Tutte le sue ore verranno rimosse.`)) return;
        try {
          await apiFetch(`/admin/users/${id}`, { method: 'DELETE' });
          showAlert('alertUsers', 'success', `✓ Utente "${uname}" eliminato`);
          loadUsers();
          loadLog();
        } catch (err) {
          showAlert('alertUsers', 'error', '✕ ' + err.message);
        }
      };

      // Add user form
      document.getElementById('addUserForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('addBtn');
        const username = document.getElementById('newUsername').value.trim();
        const displayName = document.getElementById('newDisplayName').value.trim();
        const password = document.getElementById('newPassword').value;

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span>';
        try {
          await apiFetch('/admin/users', {
            method: 'POST',
            body: JSON.stringify({ username, displayName, password })
          });
          showAlert('alertAdd', 'success', `✓ Utente "${username}" creato con successo`);
          document.getElementById('addUserForm').reset();
          loadUsers();
        } catch (err) {
          showAlert('alertAdd', 'error', '✕ ' + err.message);
        } finally {
          btn.disabled = false;
          btn.innerHTML = 'Crea Utente';
        }
      });

      // Change password form
      document.getElementById('pwdForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('pwdBtn');
        const currentPassword = document.getElementById('currentPwd').value;
        const newPassword = document.getElementById('newPwd').value;

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span>';
        try {
          await apiFetch('/auth/change-password', {
            method: 'POST',
            body: JSON.stringify({ currentPassword, newPassword })
          });
          showAlert('pwdAlert', 'success', '✓ Password aggiornata con successo!');
          document.getElementById('pwdForm').reset();
        } catch (err) {
          showAlert('pwdAlert', 'error', '✕ ' + err.message);
        } finally {
          btn.disabled = false;
          btn.innerHTML = 'Aggiorna Password';
        }
      });

      // Refresh buttons
      document.getElementById('refreshUsers').addEventListener('click', loadUsers);
      document.getElementById('refreshLog').addEventListener('click', loadLog);

      // Load on tab switch too
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          if (btn.dataset.tab === 'tab-log') loadLog();
          if (btn.dataset.tab === 'tab-users') loadUsers();
        });
      });

      // Initial load
      loadUsers();
      loadLog();
    }
  </script>
</body>
</html>
